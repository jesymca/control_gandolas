<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Choferes - GandolaControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="bg-warning" style="height:4px;"></div>
    <div class="bg-success" style="height:4px;"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-truck me-2 text-warning"></i><span class="text-warning">Gandola</span><span class="text-success">Control</span></a>
            <div class="d-flex align-items-center gap-2">
                <a href="menu.html" class="btn btn-outline-warning btn-sm nav-menu-link"><i class="bi bi-house me-1"></i>Menú</a>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h3 class="fw-bold mb-0"><i class="bi bi-person-badge text-success me-2"></i>Registro de Choferes</h3>
                <p class="text-muted mb-0">Gestiona los conductores del sistema</p>
            </div>
            <button class="btn btn-success text-white fw-bold" data-bs-toggle="modal" data-bs-target="#modalChofer" onclick="limpiarFormChofer()"><i class="bi bi-plus-circle me-1"></i>Nuevo Chofer</button>
        </div>
        <div id="alertChofer" class="alert d-none" role="alert"></div>
        <div class="card border-0 shadow">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark"><tr><th>Foto</th><th>Nombre</th><th>Apellido</th><th>Cédula</th><th>Teléfono</th><th>Acciones</th></tr></thead>
                        <tbody id="tbodyChoferes"></tbody>
                    </table>
                </div>
                <div id="sinChoferes" class="text-center py-5 d-none"><i class="bi bi-person-badge text-muted" style="font-size:4rem;"></i><p class="text-muted mt-2">No hay choferes registrados</p></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalChofer" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white"><h5 class="modal-title fw-bold" id="tituloModalChofer"><i class="bi bi-person-plus me-2"></i>Nuevo Chofer</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="formChofer">
                        <input type="hidden" id="choferId">
                        <div class="mb-3 text-center"><label class="form-label fw-bold">Foto del Chofer</label><input type="file" class="form-control" id="choferFoto" accept="image/*"><div class="mt-2" id="previewFotoChofer"></div></div>
                        <div class="mb-3"><label class="form-label fw-bold">Nombre</label><input type="text" class="form-control" id="choferNombre" required></div>
                        <div class="mb-3"><label class="form-label fw-bold">Apellido</label><input type="text" class="form-control" id="choferApellido" required></div>
                        <div class="mb-3"><label class="form-label fw-bold">Cédula de Identidad</label><input type="text" class="form-control" id="choferCedula" required></div>
                        <div class="mb-3"><label class="form-label fw-bold">Número de Teléfono</label><input type="tel" class="form-control" id="choferTelefono" required></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success text-white fw-bold" id="btnGuardarChofer"><i class="bi bi-check-circle me-1"></i>Guardar</button>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-center py-3 mt-5"><small class="text-muted"><span class="text-warning fw-bold">Gandola</span><span class="text-success fw-bold">Control</span> v1.0</small></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/choferes.js"></script>
</body>
</html>
