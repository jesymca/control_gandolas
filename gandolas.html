<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Gandolas - GandolaControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="bg-warning" style="height:4px;"></div>
    <div class="bg-success" style="height:4px;"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-truck me-2 text-warning"></i><span class="text-warning">Gandola</span><span class="text-success">Control</span></a>
            <div class="d-flex align-items-center gap-2">
                <a href="menu.html" class="btn btn-outline-warning btn-sm nav-menu-link"><i class="bi bi-house me-1"></i>Menú</a>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h3 class="fw-bold mb-0"><i class="bi bi-truck text-warning me-2"></i>Registro de Gandolas</h3>
                <p class="text-muted mb-0">Gestiona las gandolas del sistema</p>
            </div>
            <button class="btn btn-warning text-dark fw-bold" data-bs-toggle="modal" data-bs-target="#modalGandola" onclick="limpiarFormGandola()"><i class="bi bi-plus-circle me-1"></i>Nueva Gandola</button>
        </div>
        <div id="alertGandola" class="alert d-none" role="alert"></div>
        <div class="card border-0 shadow mb-4">
            <div class="card-body">
                <div class="row g-2">
                    <div class="col-md-5"><input type="text" class="form-control" id="buscarPlaca" placeholder="Buscar por placa..." oninput="cargarGandolas()"></div>
                    <div class="col-md-3"><select class="form-select" id="filtroCaucho" onchange="cargarGandolas()"><option value="">Todos</option><option value="4">4 Cauchos</option><option value="6">6 Cauchos</option></select></div>
                    <div class="col-md-4"><select class="form-select" id="filtroCondicion" onchange="cargarGandolas()"><option value="">Todas las condiciones</option><option value="bueno">Buen estado (7+)</option><option value="regular">Regular (4-6)</option><option value="malo">Malo (menos de 4)</option></select></div>
                </div>
            </div>
        </div>
        <div class="card border-0 shadow">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark"><tr><th>Foto</th><th>Placa</th><th>Modelo</th><th>Año</th><th>Cauchos</th><th>Condición</th><th>Gasoil</th><th>Acciones</th></tr></thead>
                        <tbody id="tbodyGandolas"></tbody>
                    </table>
                </div>
                <div id="sinGandolas" class="text-center py-5 d-none"><i class="bi bi-truck text-muted" style="font-size:4rem;"></i><p class="text-muted mt-2">No hay gandolas registradas</p></div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalGandola" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold" id="tituloModalGandola"><i class="bi bi-truck me-2"></i>Nueva Gandola</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formGandola">
                        <input type="hidden" id="gandolaId">
                        <div class="mb-3"><label class="form-label fw-bold">Foto de la Gandola</label><input type="file" class="form-control" id="gandolaFoto" accept="image/*"><div class="mt-2" id="previewFoto"></div></div>
                        <div class="row g-3">
                            <div class="col-md-4"><label class="form-label fw-bold">Placa</label><input type="text" class="form-control" id="gandolaPlaca" required placeholder="ABC-123" style="text-transform:uppercase;"></div>
                            <div class="col-md-4"><label class="form-label fw-bold">Modelo del Vehículo</label><input type="text" class="form-control" id="gandolaModelo" required placeholder="Freightliner"></div>
                            <div class="col-md-4"><label class="form-label fw-bold">Año</label><input type="number" class="form-control" id="gandolaAnio" required min="1990" max="2030"></div>
                        </div>
                        <hr class="my-4">
                        <h6 class="fw-bold text-warning"><i class="bi bi-circle me-1"></i>Configuración de Cauchos</h6>
                        <div class="row g-3">
                            <div class="col-md-4"><label class="form-label fw-bold">Cantidad</label><select class="form-select" id="gandolaCantCauchos" onchange="generarCamposCauchos()"><option value="4">4 Cauchos</option><option value="6">6 Cauchos</option></select></div>
                            <div class="col-md-8"><label class="form-label fw-bold">Marca de Cauchos</label><input type="text" class="form-control" id="gandolaMarcaCauchos" placeholder="Michelin, Goodyear..."></div>
                        </div>
                        <div class="row g-2 mt-2" id="contenedorCauchos"></div>
                        <hr class="my-4">
                        <h6 class="fw-bold text-success"><i class="bi bi-calendar-check me-1"></i>Fechas de Mantenimiento</h6>
                        <div class="row g-3">
                            <div class="col-md-4"><label class="form-label fw-bold">Cambio de Aceite</label><input type="date" class="form-control" id="gandolaAceite"></div>
                            <div class="col-md-4"><label class="form-label fw-bold">Filtro de Aceite</label><input type="date" class="form-control" id="gandolaFiltroAceite"></div>
                            <div class="col-md-4"><label class="form-label fw-bold">Filtro de Aire</label><input type="date" class="form-control" id="gandolaFiltroAire"></div>
                        </div>
                        <div class="row g-3 mt-1"><div class="col-md-6"><label class="form-label fw-bold">Último Suministro de Gasoil</label><input type="date" class="form-control" id="gandolaGasoil"></div></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-warning text-dark fw-bold" id="btnGuardarGandola"><i class="bi bi-check-circle me-1"></i>Guardar Gandola</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold"><i class="bi bi-info-circle me-2"></i>Detalle de Gandola</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body" id="contenidoDetalle"></div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-center py-3 mt-5"><small class="text-muted"><span class="text-warning fw-bold">Gandola</span><span class="text-success fw-bold">Control</span> v1.0</small></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/gandolas.js"></script>
</body>
</html>
