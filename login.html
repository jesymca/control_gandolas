<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - GandolaControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="bg-warning" style="height:4px;"></div>
    <div class="bg-success" style="height:4px;"></div>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-truck me-2 text-warning"></i>
                <span class="text-warning">Gandola</span><span class="text-success">Control</span>
            </a>
        </div>
    </nav>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow border-0 mt-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div class="bg-warning bg-opacity-25 rounded-circle d-inline-flex align-items-center justify-content-center p-4 mb-3"><i class="bi bi-person-lock text-warning display-5"></i></div>
                            <h3 class="fw-bold">Iniciar Sesión</h3>
                            <p class="text-muted">Ingresa tus credenciales de acceso</p>
                        </div>
                        <div id="alertLogin" class="alert d-none" role="alert"></div>
                        <form id="formLogin">
                            <div class="mb-3">
                                <label for="correo" class="form-label fw-bold">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-warning border-warning text-dark"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-warning" id="correo" required placeholder="correo@ejemplo.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="contrasena" class="form-label fw-bold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-warning border-warning text-dark"><i class="bi bi-key"></i></span>
                                    <input type="password" class="form-control border-warning" id="contrasena" required placeholder="Tu contraseña">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning text-dark w-100 fw-bold py-2" id="btnLogin">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                            </button>
                        </form>
                        <div class="text-center mt-4">
                            <a href="index.html" class="text-muted text-decoration-none"><i class="bi bi-arrow-left me-1"></i>Volver al inicio</a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3"><small class="text-muted">Admin: admin@sistema.com / admin</small></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
