<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salida del Patio - GandolaControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="bg-warning" style="height:4px;"></div>
    <div class="bg-success" style="height:4px;"></div>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-truck me-2 text-warning"></i><span class="text-warning">Gandola</span><span class="text-success">Control</span></a>
            <div class="d-flex align-items-center gap-2">
                <a href="menu.html" class="btn btn-outline-warning btn-sm nav-menu-link"><i class="bi bi-house me-1"></i>Menú</a>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()"><i class="bi bi-box-arrow-right me-1"></i>Salir</button>
            </div>
        </div>
    </nav>
    <div class="container py-4">
        <div class="text-center mb-4">
            <span class="badge bg-success mb-2">MOVIMIENTO DE PATIO</span>
            <h3 class="fw-bold"><i class="bi bi-arrow-up-circle text-success me-2"></i>Salida de Gandola del Patio</h3>
            <p class="text-muted">Seleccione la gandola y registre su salida</p>
        </div>
        <div id="alertSalida" class="alert d-none" role="alert"></div>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow">
                    <div class="card-header bg-success text-white fw-bold"><i class="bi bi-arrow-up-circle me-2"></i>Formulario de Salida</div>
                    <div class="card-body p-4">
                        <form id="formSalida">
                            <div class="row g-3 mb-4">
                                <div class="col-md-6"><label class="form-label fw-bold">Seleccionar Gandola</label><select class="form-select" id="salGandola" required><option value="">-- Seleccione una gandola --</option></select></div>
                                <div class="col-md-6"><label class="form-label fw-bold">Seleccionar Chofer</label><select class="form-select" id="salChofer"><option value="">-- Sin chofer asignado --</option></select></div>
                            </div>
                            <div id="infoGandolaSal" class="d-none mb-4">
                                <div class="alert bg-dark text-white mb-0">
                                    <div class="row align-items-center">
                                        <div class="col-md-2 text-center" id="infoGandolaFotoSal"></div>
                                        <div class="col-md-10">
                                            <h5 class="mb-1 text-success" id="infoGandolaPlacaSal"></h5>
                                            <p class="mb-1" id="infoGandolaModeloSal"></p>
                                            <small class="text-secondary" id="infoGandolaUltimoSal"></small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-4"><label class="form-label fw-bold">Observaciones de Salida</label><textarea class="form-control" id="salObservaciones" rows="3" placeholder="Motivo de salida, destino, observaciones..."></textarea></div>
                            <div class="text-center"><button type="submit" class="btn btn-success text-white fw-bold btn-lg px-5"><i class="bi bi-check-circle me-2"></i>Registrar Salida del Patio</button></div>
                        </form>
                    </div>
                </div>
                <div class="card border-0 shadow mt-4">
                    <div class="card-header bg-dark text-white fw-bold"><i class="bi bi-clock-history me-2"></i>Últimas Salidas Registradas</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-sm mb-0">
                                <thead class="table-secondary"><tr><th>Fecha/Hora</th><th>Gandola</th><th>Chofer</th><th>Observaciones</th></tr></thead>
                                <tbody id="tbodySalidas"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="bg-dark text-center py-3 mt-5"><small class="text-muted"><span class="text-warning fw-bold">Gandola</span><span class="text-success fw-bold">Control</span> v1.0</small></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/registros.js"></script>
</body>
</html>
